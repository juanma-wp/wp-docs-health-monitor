name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve PR head branch
        id: pr-branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=""
          if [[ "${{ github.event_name }}" == "pull_request_review" || "${{ github.event_name }}" == "pull_request_review_comment" ]]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
          elif [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1.0.111
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          base_branch: ${{ steps.pr-branch.outputs.branch }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # No `prompt:` set on purpose — the action's default mode reads the
          # triggering comment, drives the review, and posts the result via
          # its built-in `mcp__github__update_claude_comment` tool. Setting
          # a custom `prompt:` was previously suppressing that auto-post path
          # (Claude tried alternatives that the sandbox denied — observed as
          # `permission_denials_count: 12` and "No buffered inline comments"
          # in past runs of PR #51, #52, #53, #54, #55, #58).

